<style>
:root {
  --pink:   #FF2D78;
  --yellow: #FFD100;
  --cyan:   #00CFEF;
  --orange: #FF7A00;
  --purple: #8B2FE8;
  --green:  #00C853;
  --navy:   #1A1235;
  --bg:     #EEF6FF;
  --blue1:  #6B8FFF;
  --blue2:  #A78BFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(145deg, #d6e8ff 0%, #e8d6ff 100%);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none !important; }
.screen.active { display: flex !important; flex-direction: column; min-height: 100vh; }

/* ══ START SCREEN ══════════════════════════════════════════════════ */
#screen-start { align-items: center; padding-bottom: 24px; }

.start-logo-wrap {
  width: 100%; max-width: 560px;
  padding: 18px 16px 4px;
}
.start-logo-wrap img {
  width: 100%; height: auto; display: block;
  border-radius: 16px;
  border: 3px solid var(--navy);
  box-shadow: 5px 5px 0 var(--navy);
}

/* Firebase status pill */
.fb-status {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.75rem;
  padding: 4px 12px;
  border: 2px solid var(--navy);
  border-radius: 20px;
  margin: 8px auto 0;
  width: fit-content;
  background: white;
  box-shadow: 2px 2px 0 var(--navy);
}
.fb-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
.fb-dot.connected    { background: var(--green); }
.fb-dot.disconnected { background: #ff4444; }
.fb-dot.local        { background: var(--yellow); }

.start-card {
  background: white;
  border: 3px solid var(--navy);
  border-radius: 18px;
  box-shadow: 5px 5px 0 var(--navy);
  padding: 18px 16px;
  margin: 12px 14px 0;
  width: calc(100% - 28px);
  max-width: 500px;
}
.start-card h2 {
  font-family: 'Fredoka One', cursive;
  font-size: 1.05rem;
  color: var(--navy);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

.date-row { display: flex; gap: 8px; align-items: stretch; }
.date-input {
  flex: 1;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem; font-weight: 800;
  border: 3px solid var(--navy);
  border-radius: 12px;
  padding: 9px 12px;
  background: white; color: var(--navy);
  outline: none;
  box-shadow: 3px 3px 0 var(--navy);
}
.date-input:focus { border-color: var(--pink); }

.btn-open {
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  background: var(--pink); color: white;
  border: 3px solid var(--navy);
  border-radius: 12px;
  padding: 9px 18px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--navy);
  transition: transform 0.08s, box-shadow 0.08s;
}
.btn-open:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--navy); }

.prev-header {
  font-family: 'Fredoka One', cursive;
  font-size: 0.95rem; color: var(--navy);
  margin-bottom: 8px;
}
.session-list { display: flex; flex-direction: column; gap: 7px; }

  border: 3px solid var(--navy);
  border-radius: 11px;
  padding: 9px 12px;
  box-shadow: 3px 3px 0 var(--navy);
  cursor: pointer;
  transition: transform 0.08s, box-shadow 0.08s;
}
.session-item:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--navy); }
.session-item:hover  { background: #f0f8ff; }
.session-date { font-family: 'Fredoka One', cursive; font-size: 0.95rem; flex: 1; color: var(--navy); }
.session-count {
  font-family: 'Fredoka One', cursive; font-size: 0.82rem;
  background: var(--pink); color: white;
  border: 2px solid var(--navy); border-radius: 10px;
  padding: 2px 9px;
}
.session-del {
  background: none; border: none;
  font-size: 1rem; cursor: pointer;
  opacity: 0.35; padding: 2px 4px;
}
.session-del:hover { opacity: 1; }
.no-sessions { text-align:center; color:#aaa; font-size:0.8rem; font-weight:700; padding:10px; }

.bottom-btns {
  display: flex; gap: 8px;
  padding: 10px 14px 0;
  width: 100%; max-width: 500px;
  flex-wrap: wrap;
}

/* ══ SESSION SCREEN ════════════════════════════════════════════════ */
.session-header {
  background: white;
  border-bottom: 4px solid var(--navy);
  padding: 10px 12px;
  display: flex; align-items: center; gap: 8px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 0 var(--navy);
}
.back-btn {
  font-family: 'Fredoka One', cursive; font-size: 0.85rem;
  background: var(--yellow); color: var(--navy);
  border: 3px solid var(--navy); border-radius: 9px;
  padding: 6px 11px; cursor: pointer;
  box-shadow: 2px 2px 0 var(--navy);
  flex-shrink: 0;
  transition: transform 0.08s, box-shadow 0.08s;
}
.back-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--navy); }

.session-title { flex: 1; text-align: center; }
.st-main {
  font-family: 'Fredoka One', cursive;
  font-size: 0.95rem; color: var(--pink);
  display: block;
}
.st-date {
  font-size: 0.65rem; font-weight: 800;
  color: var(--navy); opacity: 0.55;
  display: block; text-transform: uppercase; letter-spacing: 0.04em;
}

.coach-btn {
  font-family: 'Fredoka One', cursive; font-size: 0.8rem;
  border: 3px solid var(--navy); border-radius: 9px;
  padding: 6px 10px; cursor: pointer;
  box-shadow: 2px 2px 0 var(--navy);
  flex-shrink: 0;
  transition: transform 0.08s, box-shadow 0.08s;
}
.coach-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--navy); }
.coach-btn.locked   { background: #f0f0f0; color: #888; }
.coach-btn.unlocked { background: var(--green); color: white; }

.tab-bar {
  display: flex; background: white;
  border-bottom: 3px solid var(--navy);
}
.stab {
  flex: 1; font-family: 'Fredoka One', cursive; font-size: 0.8rem;
  padding: 9px 4px; text-align: center; cursor: pointer;
  border-bottom: 4px solid transparent; color: #888;
  transition: all 0.1s;
}
.stab.active { color: var(--pink); border-bottom-color: var(--pink); background: #fff3f8; }

.session-content { flex: 1; padding: 10px 10px; }

/* ══ PLAYER CARDS (collapsible) ════════════════════════════════════ */
.players-stack { display: flex; flex-direction: column; gap: 10px; }

.player-card {
  background: white;
  border: 3px solid var(--navy);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 4px 4px 0 var(--navy);
  transition: box-shadow 0.2s;
}
.player-card.pulsing { animation: cardPulse 0.4s ease; }

.player-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.player-header:hover { filter: brightness(0.97); }

.player-arrow {
  font-size: 0.9rem; flex-shrink: 0;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  color: var(--navy);
}
.player-card.expanded .player-arrow { transform: rotate(90deg); }

.player-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.05rem; color: var(--navy); flex: 1;
}

.player-totals {
  display: flex; gap: 5px; align-items: center; flex-shrink: 0;
}
.ptotal-pill {
  font-family: 'Fredoka One', cursive; font-size: 0.8rem;
  border: 2px solid var(--navy); border-radius: 14px;
  padding: 2px 10px; white-space: nowrap;
}
.ptotal-pill.cats    { background: var(--pink);   color: white; }
.ptotal-pill.ff      { background: var(--purple);  color: white; }
.ptotal-pill.zero    { background: #e8e8e8; color: #aaa; }

.player-body { display: none; border-top: 3px solid var(--navy); }
.player-card.expanded .player-body { display: block; }

/* ── COMPLAINT ROWS ── */
.complaint-row {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 12px;
  border-bottom: 2px solid #f0f0f0;
}
.complaint-row:hover { background: #f8f4ff; }
.c-emoji { font-size: 1rem; flex-shrink: 0; width: 22px; text-align: center; }
.c-label { flex: 1; font-size: 0.75rem; font-weight: 800; color: var(--navy); }
.c-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.cnt-btn {
  width: 28px; height: 28px;
  border-radius: 8px; border: 2px solid var(--navy);
  font-size: 1rem; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 2px 2px 0 var(--navy);
  font-family: 'Fredoka One', cursive;
  transition: transform 0.08s, box-shadow 0.08s;
}
.cnt-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--navy); }
.cnt-btn.minus { background: #f5f5f5; color: var(--navy); }
.cnt-btn.minus:hover { background: #ffe0e0; }
.cnt-btn.plus  { background: var(--pink); color: white; }
.c-count { font-family: 'Fredoka One', cursive; font-size: 0.95rem; min-width: 22px; text-align: center; color: #ccc; }
.c-count.nz { color: var(--pink); }

/* ── FREEFORM SECTION ── */
.freeform-section { padding: 8px 12px 12px; background: #FAFAFF; }
.ff-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.ff-label {
  font-size: 0.68rem; font-weight: 900; color: var(--navy);
  opacity: 0.5; text-transform: uppercase; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 4px;
}
.ff-add-btn {
  font-family: 'Fredoka One', cursive; font-size: 0.78rem;
  background: var(--purple); color: white;
  border: 2px solid var(--navy); border-radius: 8px;
  padding: 3px 10px; cursor: pointer;
  box-shadow: 2px 2px 0 var(--navy);
  transition: transform 0.08s, box-shadow 0.08s;
}
.ff-add-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--navy); }

.ff-entries { display: flex; flex-direction: column; gap: 5px; }

.ff-entry {
  display: flex; gap: 5px; align-items: flex-start;
}
.ff-input {
  flex: 1;
  border: 2px solid #ddd; border-radius: 8px;
  padding: 6px 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  color: var(--navy); background: white;
  outline: none; resize: none;
  min-height: 46px;
  transition: border-color 0.1s;
}
.ff-input:focus { border-color: var(--purple); }
.ff-input::placeholder { color: #ccc; }
.ff-input.private-hidden { background: #f5f5f5; color: #bbb; font-style: italic; cursor: default; }
.ff-del-btn {
  background: none; border: none;
  font-size: 1rem; cursor: pointer;
  opacity: 0.3; padding: 4px;
  flex-shrink: 0;
  margin-top: 4px;
}
.ff-del-btn:hover { opacity: 0.8; }

.ff-private-note {
  font-size: 0.68rem; font-weight: 800;
  color: var(--purple); opacity: 0.7;
  text-align: center; padding: 6px;
  font-style: italic;
}

/* ── ANON CARD ── */
.anon-card .player-header { background: linear-gradient(90deg, #f8f0ff, #fff0f8); }

/* ══ SEASON VIEW ═══════════════════════════════════════════════════ */
.lb-section-title {
  font-family: 'Fredoka One', cursive; font-size: 0.95rem;
  color: var(--navy); margin: 0 0 7px;
  padding: 5px 0 3px;
  border-bottom: 3px solid var(--navy);
  display: flex; align-items: center; gap: 6px;
}
.lb-grid { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.lb-row {
  display: flex; align-items: center; gap: 7px;
  background: white; border: 3px solid var(--navy);
  border-radius: 11px; padding: 8px 11px;
  box-shadow: 3px 3px 0 var(--navy);
}
.lb-rank { font-family: 'Fredoka One', cursive; font-size: 1.05rem; width: 26px; text-align: center; flex-shrink: 0; }
.lb-name { flex: 1; font-weight: 900; font-size: 0.88rem; }
.lb-num  { font-family: 'Fredoka One', cursive; font-size: 1.15rem; color: var(--pink); }
.lb-breakdown { display: flex; flex-wrap: wrap; gap: 3px; padding: 3px 11px 7px 44px; }
.lb-chip {
  background: #f0e8ff; border: 2px solid var(--navy);
  border-radius: 20px; font-size: 0.6rem; font-weight: 800;
  padding: 2px 6px; color: var(--navy);
  display: flex; align-items: center; gap: 2px;
}
.chip-cnt { color: var(--orange); font-family: 'Fredoka One', cursive; }

.cat-bar-card {
  background: white; border: 3px solid var(--navy);
  border-radius: 12px; overflow: hidden;
  box-shadow: 3px 3px 0 var(--navy); margin-bottom: 14px;
}
.cat-bar-title {
  font-family: 'Fredoka One', cursive; font-size: 0.88rem;
  padding: 7px 11px; background: var(--cyan);
  border-bottom: 3px solid var(--navy); color: var(--navy);
}
.cat-bar-row {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 11px; border-bottom: 2px solid #f0f0f0;
  font-size: 0.73rem; font-weight: 800;
}
.cat-bar-row:last-child { border-bottom: none; }
.bar-wrap { flex: 1; height: 11px; background: #f0f0f0; border-radius: 6px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--orange); border-radius: 6px; transition: width 0.5s cubic-bezier(.34,1.56,.64,1); }
.bar-cnt  { font-family: 'Fredoka One', cursive; font-size: 0.88rem; color: var(--orange); min-width: 20px; text-align: right; }

/* FF history - coach only */
.ff-history-card {
  background: white; border: 3px solid var(--navy);
  border-radius: 12px; overflow: hidden;
  box-shadow: 3px 3px 0 var(--navy); margin-bottom: 14px;
}
.fh-title {
  font-family: 'Fredoka One', cursive; font-size: 0.88rem;
  padding: 7px 11px; background: var(--purple); color: white;
  border-bottom: 3px solid var(--navy);
  display: flex; align-items: center; gap: 6px;
}
.fh-row { padding: 7px 11px; border-bottom: 2px solid #f5f0ff; font-size: 0.75rem; }
.fh-row:last-child { border-bottom: none; }
.fh-who { font-weight: 900; color: var(--purple); font-size: 0.7rem; }
.fh-date { font-size: 0.62rem; color: #aaa; font-weight: 700; }
.fh-text { color: var(--navy); font-weight: 700; margin-top: 2px; font-style: italic; }
.ff-locked-note {
  padding: 16px; text-align: center;
  font-size: 0.78rem; font-weight: 800; color: #aaa;
  font-style: italic;
}

/* ══ SHARED UTILS ════════════════════════════════════════════════ */
.btn {
  font-family: 'Fredoka One', cursive; font-size: 0.82rem;
  padding: 7px 13px;
  border: 3px solid var(--navy); border-radius: 10px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--navy);
  transition: transform 0.08s, box-shadow 0.08s;
}
.btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--navy); }
.btn-pink   { background: var(--pink);   color: white; }
.btn-yellow { background: var(--yellow); color: var(--navy); }
.btn-cyan   { background: var(--cyan);   color: var(--navy); }
.btn-purple { background: var(--purple); color: white; }

/* ── STAMP ── */
@keyframes stampIn {
  0%   { transform: translate(-50%,-50%) scale(3) rotate(-12deg); opacity: 0; }
  60%  { transform: translate(-50%,-50%) scale(0.9) rotate(3deg); opacity: 1; }
  80%  { transform: translate(-50%,-50%) scale(1.08) rotate(-1deg); }
  100% { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
}
@keyframes stampOut {
  0%   { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%,-60%) scale(0.5); }
}
.stamp-overlay {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: 9999; pointer-events: none; display: none;
}
.stamp-text {
  font-family: 'Fredoka One', cursive; font-size: 1.8rem;
  color: var(--pink); border: 5px solid var(--pink);
  border-radius: 12px; padding: 6px 14px;
  background: white; transform: rotate(-8deg);
  box-shadow: 4px 4px 0 var(--navy); white-space: nowrap;
}
.confetti-piece {
  position: fixed; pointer-events: none; z-index: 9998;
  border-radius: 2px; animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes cardPulse {
  0%,100% { box-shadow: 4px 4px 0 var(--navy); }
  50%     { box-shadow: 4px 4px 0 var(--navy), 0 0 18px var(--pink); }
}

/* ── PIN MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,18,53,0.75);
  z-index: 500; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border: 4px solid var(--navy);
  border-radius: 18px; padding: 24px;
  box-shadow: 8px 8px 0 var(--navy);
  max-width: 320px; width: 100%;
  text-align: center;
}
.modal h2 { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--purple); margin-bottom: 8px; }
.modal p  { font-size: 0.8rem; color: #666; margin-bottom: 14px; }
.pin-input {
  width: 100%; font-family: 'Fredoka One', cursive;
  font-size: 1.5rem; text-align: center;
  letter-spacing: 0.3em;
  border: 3px solid var(--navy); border-radius: 12px;
  padding: 10px; outline: none; margin-bottom: 14px;
  box-shadow: 3px 3px 0 var(--navy);
}
.pin-input:focus { border-color: var(--purple); }
.modal-btns { display: flex; gap: 8px; justify-content: center; }
.pin-error { color: var(--pink); font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; display: none; }

/* ── FILTER BADGE ── */
.filter-badge {
  display: inline-block;
  background: var(--orange); color: white;
  border: 2px solid var(--navy); border-radius: 10px;
  font-size: 0.62rem; font-weight: 900;
  padding: 1px 6px; margin-left: 4px;
  vertical-align: middle;
  animation: badgePop 0.3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes badgePop {
  0%   { transform: scale(0); }
  100% { transform: scale(1); }
}

@media (max-width: 380px) {
  .c-label { font-size: 0.69rem; }
  .cnt-btn { width: 25px; height: 25px; }
}
</style>
</head>

    <div class="modal-btns">

    if (regex.test(filtered)) {
      filtered = filtered.replace(regex, () => {
        const r = REPLACEMENTS[Math.floor(Math.random() * REPLACEMENTS.length)];
        replacedCount++;
        return r;
      });
    }
  });
  return { text: filtered, count: replacedCount };
}

// ── STATE ─────────────────────────────────────────────────────────────
let db = null;
let fbConnected = false;
let data = {};           // local mirror of Firebase data
let currentDate = '';
let coachUnlocked = false;
let currentSessionTabName = 'session';

// ── FIREBASE INIT ─────────────────────────────────────────────────────
function initFirebase() {
  const cfg = window.FIREBASE_CONFIG;
  const isConfigured = cfg && cfg.apiKey && !cfg.apiKey.startsWith('PASTE_');
  
  if (!isConfigured) {
    updateFbStatus(false, 'Firebase not configured — local mode');
    loadLocal();
    return;
  }

  try {
    const app = initializeApp(cfg);
    db = getDatabase(app);

    // Connection state
    const connRef = ref(db, '.info/connected');
    onValue(connRef, snap => {
      fbConnected = snap.val() === true;
      updateFbStatus(fbConnected, fbConnected ? 'Live sync active' : 'Reconnecting…');
    });

    // Listen to all session data
    const sessRef = ref(db, 'complaints/sessions');
    onValue(sessRef, snap => {
      data = snap.val() || {};
      renderSessionList();
      if (currentDate && currentSessionTabName === 'session') renderPlayers();
      if (currentDate && currentSessionTabName === 'season')  renderSeasonView();
    });

  } catch(e) {
    console.error('Firebase init error:', e);
    updateFbStatus(false, 'Firebase error — local mode');
    loadLocal();
  }
}

function updateFbStatus(connected, msg) {
  document.getElementById('fbDot').className = 'fb-dot ' + (connected ? 'connected' : fbConnected === false && msg.includes('not configured') ? 'local' : 'disconnected');
  document.getElementById('fbStatusText').textContent = msg;
}

// ── LOCAL FALLBACK ────────────────────────────────────────────────────
function saveLocal() { localStorage.setItem('fcm_v3', JSON.stringify(data)); }
function loadLocal()  {
  const d = localStorage.getItem('fcm_v3');
  if (d) data = JSON.parse(d);
  renderSessionList();
}

// ── DB WRITE HELPERS ──────────────────────────────────────────────────
async function dbSetCat(date, player, catId, value) {
  const path = `complaints/sessions/${date}/${player}/cats/${catId}`;
  if (db) {
    await set(ref(db, path), value);
  } else {
    if (!data[date])                   data[date] = {};
    if (!data[date][player])           data[date][player] = {};
    if (!data[date][player].cats)      data[date][player].cats = {};
    data[date][player].cats[catId] = value;
    saveLocal();
    renderPlayers();
  }
}

async function dbAddFreeform(date, player, text) {
  const path = `complaints/sessions/${date}/${player}/freeforms`;
  if (db) {
    await push(ref(db, path), { text, ts: Date.now() });
  } else {
    if (!data[date])                     data[date] = {};
    if (!data[date][player])             data[date][player] = {};
    if (!data[date][player].freeforms)   data[date][player].freeforms = {};
    const key = 'ff_' + Date.now();
    data[date][player].freeforms[key] = { text, ts: Date.now() };
    saveLocal();
    renderPlayers();
  }
}

async function dbUpdateFreeform(date, player, ffKey, text) {
  const path = `complaints/sessions/${date}/${player}/freeforms/${ffKey}/text`;
  if (db) {
    await set(ref(db, path), text);
  } else {
    if (data[date]?.[player]?.freeforms?.[ffKey]) {
      data[date][player].freeforms[ffKey].text = text;
      saveLocal();
    }
  }
}

async function dbDeleteFreeform(date, player, ffKey) {
  const path = `complaints/sessions/${date}/${player}/freeforms/${ffKey}`;
  if (db) {
    await remove(ref(db, path));
  } else {
    if (data[date]?.[player]?.freeforms) {
      delete data[date][player].freeforms[ffKey];
      saveLocal();
      renderPlayers();
    }
  }
}

async function dbDeleteSession(date) {
  if (db) {
    await remove(ref(db, `complaints/sessions/${date}`));
  } else {
    delete data[date];
    saveLocal();
    renderSessionList();
  }
}

function todayStr() { return new Date().toISOString().slice(0,10); }

  document.getElementById('screen-start').classList.add('active');
  document.getElementById('screen-session').classList.remove('active');
  renderSessionList();
}

window.showStart = showStart;

function renderSessionList() {
  const list = document.getElementById('sessionList');
  const dates = Object.keys(data).filter(k => !k.startsWith('__')).sort((a,b)=>b.localeCompare(a));
  if (!dates.length) {
    list.innerHTML = '<div class="no-sessions">No sessions yet!</div>';
    return;
  }
  list.innerHTML = dates.map(d => {
    const total = sessionCatTotal(d);
    const ffCount = sessionFfCount(d);
    const countLabel = total + (ffCount ? ` + ${ffCount} private` : '') + ' complaint' + (total+ffCount!==1?'s':'');
    return `<div class="session-item" onclick="openSession('${d}')">
      <span style="font-size:1.1rem">📅</span>
      <span class="session-date">${fmtDate(d)}</span>
      <span class="session-count">${countLabel}</span>
      <button class="session-del" onclick="deleteSession(event,'${d}')">🗑</button>
    </div>`;
  }).join('');
}

function sessionCatTotal(date) {
  return ALL_PLAYERS.reduce((s,p) =>
    s + CATS.reduce((ss,c)=>ss+(data[date]?.[p]?.cats?.[c.id]||0),0), 0);
}
function sessionFfCount(date) {
  return ALL_PLAYERS.reduce((s,p) =>
    s + Object.keys(data[date]?.[p]?.freeforms||{}).length, 0);
}

// ── RENDER PLAYERS ────────────────────────────────────────────────────
function renderPlayers() {
  const stack = document.getElementById('playersStack');
  const wasExpanded = {};
  stack.querySelectorAll('.player-card').forEach(c => {
    wasExpanded[c.dataset.player] = c.classList.contains('expanded');
  });

  stack.innerHTML = ALL_PLAYERS.map((name, pi) => {
    const isAnon = name === ANON;
    const displayName = isAnon ? '🕵️ Anonymous' : name;
    const pd = data[currentDate]?.[name] || {};
    const cats = pd.cats || {};
    const ffs = pd.freeforms || {};
    const catTotal = CATS.reduce((s,c)=>s+(cats[c.id]||0),0);
    const ffKeys   = Object.keys(ffs).sort((a,b)=>(ffs[a].ts||0)-(ffs[b].ts||0));
    const isExpanded = wasExpanded[name] || catTotal > 0 || ffKeys.length > 0;

    // Category rows (not for anon)
    const catRows = isAnon ? '' : CATS.map(c => {
      const cnt = cats[c.id]||0;
      return `<div class="complaint-row">
        <span class="c-emoji">${c.emoji}</span>
        <span class="c-label">${c.label}</span>
        <div class="c-controls">
          <button class="cnt-btn minus" onclick="adjustCat(event,'${name}','${c.id}',-1)">−</button>
          <span class="c-count${cnt>0?' nz':''}" id="cnt-${name}-${c.id}">${cnt}</span>
          <button class="cnt-btn plus"  onclick="adjustCat(event,'${name}','${c.id}',1)">+</button>
        </div>
      </div>`;
    }).join('');

    // Freeform entries
    let ffEntries = '';
    if (coachUnlocked) {
      ffEntries = ffKeys.map(k => {
        const val = escHtml(ffs[k].text||'');
        return `<div class="ff-entry">
          <textarea class="ff-input" rows="2"
            placeholder="Type formal grievance..."
            onblur="updateFf(event,'${name}','${k}')"
          >${val}</textarea>
          <button class="ff-del-btn" onclick="deleteFf(event,'${name}','${k}')">✕</button>
        </div>`;
      }).join('');
    } else {
      // Players see their OWN entries as editable, others' as hidden
      // (All visible in "player view" — freeforms are private to coach in season/history only)
      ffEntries = ffKeys.map(k => {
        const val = escHtml(ffs[k].text||'');
        return `<div class="ff-entry">
          <textarea class="ff-input" rows="2"
            placeholder="Type formal grievance..."
            onblur="updateFf(event,'${name}','${k}')"
          >${val}</textarea>
          <button class="ff-del-btn" onclick="deleteFf(event,'${name}','${k}')">✕</button>
        </div>`;
      }).join('');
    }

    const ffCount = ffKeys.length;
    const catPill = !isAnon && catTotal > 0
      ? `<span class="ptotal-pill cats">${catTotal}</span>` : '';
    const ffPill = ffCount > 0
      ? `<span class="ptotal-pill ff">${ffCount} private</span>`
      : (!isAnon && catTotal === 0 ? '<span class="ptotal-pill zero">No complaints</span>' : '');
    const anonPill = isAnon && ffCount === 0
      ? '<span class="ptotal-pill zero">No complaints</span>' : '';

    const cardBg = CARD_COLORS[pi % CARD_COLORS.length];

    return `<div class="player-card${isExpanded?' expanded':''} ${isAnon?'anon-card':''}"
                 id="card-${name}" data-player="${name}">
      <div class="player-header" style="background:${cardBg}" onclick="toggleCard('${name}')">
        <span class="player-arrow">▶</span>
        <span class="player-name">${displayName}</span>
        <div class="player-totals">
          ${catPill}${ffPill}${anonPill}
        </div>
      </div>
      <div class="player-body">
        ${catRows}
        <div class="freeform-section">
          <div class="ff-section-header">
            <div class="ff-label">🔒 Private complaint</div>
            <button class="ff-add-btn" onclick="addFf(event,'${name}')">+ Add</button>
          </div>
          <div class="ff-entries" id="ff-entries-${name}">${ffEntries}</div>
          ${!coachUnlocked && ffCount > 0 ? '' : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ADJUST CATEGORY ───────────────────────────────────────────────────
window.adjustCat = async function(e, name, catId, delta) {
  e.stopPropagation();
  const cur = data[currentDate]?.[name]?.cats?.[catId] || 0;
  const val = Math.max(0, cur + delta);
  await dbSetCat(currentDate, name, catId, val);

  if (!db) return; // local already handled
  // Optimistic local update
  if (!data[currentDate])                    data[currentDate] = {};
  if (!data[currentDate][name])              data[currentDate][name] = {};
  if (!data[currentDate][name].cats)         data[currentDate][name].cats = {};
  data[currentDate][name].cats[catId] = val;

  const span = document.getElementById(`cnt-${name}-${catId}`);
  if (span) { span.textContent = val; span.className = 'c-count' + (val>0?' nz':''); }
  updatePlayerPills(name);

  if (delta > 0) { showStamp(); pulseCard(name); if(Math.random()<0.3) spawnConfetti(); }
};

// ── FREEFORM ──────────────────────────────────────────────────────────
window.addFf = async function(e, name) {
  e.stopPropagation();
  await dbAddFreeform(currentDate, name, '');
  if (!db) return;
  // Firebase onValue will re-render; for instant feedback:
  renderPlayers();
  // Focus the new textarea
  setTimeout(() => {
    const entries = document.getElementById(`ff-entries-${name}`);
    if (entries) {
      const tas = entries.querySelectorAll('textarea');
      if (tas.length) tas[tas.length-1].focus();
    }
  }, 100);
};

window.updateFf = async function(e, name, key) {
  const raw = e.target.value;
  const { text, count } = filterText(raw);
  if (text !== raw) {
    e.target.value = text;
    if (count > 0) {
      const badge = document.createElement('span');
      badge.className = 'filter-badge';
      badge.textContent = `${count} word${count>1?'s':''} upgraded 🌸`;
      e.target.parentNode.after(badge);
      setTimeout(() => badge.remove(), 2500);
    }
  }
  await dbUpdateFreeform(currentDate, name, key, text);
};

window.deleteFf = async function(e, name, key) {
  e.stopPropagation();
  await dbDeleteFreeform(currentDate, name, key);
  if (!db) return;
  renderPlayers();
};

function updatePlayerPills(name) {
  const card = document.getElementById(`card-${name}`);
  if (!card) return;
  const pd = data[currentDate]?.[name] || {};
  const cats = pd.cats || {};
  const ffs  = pd.freeforms || {};
  const catTotal = CATS.reduce((s,c)=>s+(cats[c.id]||0),0);
  const ffCount  = Object.keys(ffs).length;
  const isAnon   = name === ANON;

  const pillsEl = card.querySelector('.player-totals');
  if (pillsEl) {
    const catPill = !isAnon && catTotal > 0 ? `<span class="ptotal-pill cats">${catTotal}</span>` : '';
    const ffPill  = ffCount > 0 ? `<span class="ptotal-pill ff">${ffCount} private</span>`
                  : (!isAnon && catTotal===0 ? '<span class="ptotal-pill zero">No complaints</span>' : '');
    const anonPill = isAnon && ffCount === 0 ? '<span class="ptotal-pill zero">No complaints</span>' : '';
    pillsEl.innerHTML = catPill + ffPill + anonPill;
  }
}

// ── SEASON VIEW ───────────────────────────────────────────────────────
function renderSeasonView() {
  const el = document.getElementById('seasonContent');
  const allDates = Object.keys(data).filter(k=>!k.startsWith('__')).sort();

  const playerStats = PLAYERS.map(name => {
    const catTotals = Object.fromEntries(CATS.map(c=>[c.id,
      allDates.reduce((s,d)=>s+(data[d]?.[name]?.cats?.[c.id]||0),0)
    ]));
    const grand = Object.values(catTotals).reduce((a,b)=>a+b,0);
    const ffAll = [];
    allDates.forEach(d => {
      const ffs = data[d]?.[name]?.freeforms || {};
      Object.entries(ffs).forEach(([k,v]) => ffAll.push({ date:d, text:v.text||'' }));
    });
    return { name, catTotals, grand, ffAll };
  }).sort((a,b)=>b.grand-a.grand);

  const maxGrand = playerStats[0]?.grand || 1;
  const rankEmoji = ['🥇','🥈','🥉'];

  const lbRows = playerStats.map((pd,i) => {
    const chips = CATS.filter(c=>pd.catTotals[c.id]>0).map(c=>
      `<span class="lb-chip">${c.emoji} ${c.label} <span class="chip-cnt">×${pd.catTotals[c.id]}</span></span>`
    ).join('');
    return `<div>
      <div class="lb-row">
        <span class="lb-rank">${i<3?rankEmoji[i]:i+1+'.'}</span>
        <span class="lb-name">${pd.name}</span>
        <span class="lb-num">${pd.grand}</span>
      </div>
      ${chips ? `<div class="lb-breakdown">${chips}</div>` : ''}
    </div>`;
  }).join('');

  const catTotals = CATS.map(c=>({
    ...c,
    sum: allDates.reduce((s,d)=>s+PLAYERS.reduce((ss,p)=>ss+(data[d]?.[p]?.cats?.[c.id]||0),0),0)
  })).sort((a,b)=>b.sum-a.sum);
  const maxCat = catTotals[0]?.sum||1;

  const catBars = catTotals.map(c=>`
    <div class="cat-bar-row">
      <span style="font-size:0.9rem;width:20px;text-align:center">${c.emoji}</span>
      <span style="flex:1;font-size:0.7rem;font-weight:800">${c.label}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(c.sum/maxCat*100)}%"></div></div>
      <span class="bar-cnt">${c.sum}</span>
    </div>`).join('');

  // Anonymous freeforms (coach only)
  let anonSection = '';
  const anonEntries = [];
  allDates.forEach(d => {
    const ffs = data[d]?.[ANON]?.freeforms || {};
    Object.values(ffs).forEach(v => { if(v.text?.trim()) anonEntries.push({ date:d, text:v.text }); });
  });

  // Freeform history - COACH ONLY
  let ffSection = '';
  if (coachUnlocked) {
    const ffEntries = [];
    allDates.slice().reverse().forEach(d => {
      [...PLAYERS, ANON].forEach(p => {
        const ffs = data[d]?.[p]?.freeforms || {};
        Object.values(ffs).forEach(v => {
          if (v.text?.trim()) ffEntries.push({ date:d, name: p===ANON?'Anonymous':p, text:v.text });
        });
      });
    });
    if (ffEntries.length) {
      ffSection = `
        <div class="lb-section-title">🔒 Private Grievances (Coach View)</div>
        <div class="ff-history-card">
          <div class="fh-title">🔐 Confidential Complaints</div>
          ${ffEntries.map(e=>`
            <div class="fh-row">
              <div class="fh-who">${e.name} <span class="fh-date">— ${fmtDate(e.date)}</span></div>
              <div class="fh-text">"${escHtml(e.text)}"</div>
            </div>`).join('')}
        </div>`;
    }
  } else {
    const totalFf = allDates.reduce((s,d)=>s+ALL_PLAYERS.reduce((ss,p)=>ss+Object.keys(data[d]?.[p]?.freeforms||{}).length,0),0);
    if (totalFf > 0) {
      ffSection = `
        <div class="lb-section-title">🔒 Private Grievances</div>
        <div class="ff-history-card">
          <div class="ff-locked-note">🔐 ${totalFf} private complaint${totalFf!==1?'s':''} on file.<br>Coach PIN required to view.</div>
        </div>`;
    }
  }

  const totalSessions = allDates.length;
  const grandTotal = playerStats.reduce((s,p)=>s+p.grand,0);

  el.innerHTML = `
    <div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
      <div style="background:var(--pink);color:white;border:3px solid var(--navy);border-radius:11px;padding:6px 12px;box-shadow:2px 2px 0 var(--navy);font-family:'Fredoka One',cursive;font-size:0.85rem;flex:1;text-align:center">
        ${totalSessions} session${totalSessions!==1?'s':''}
      </div>
      <div style="background:var(--yellow);color:var(--navy);border:3px solid var(--navy);border-radius:11px;padding:6px 12px;box-shadow:2px 2px 0 var(--navy);font-family:'Fredoka One',cursive;font-size:0.85rem;flex:1;text-align:center">
        ${grandTotal} complaints
      </div>
    </div>
    <div class="lb-section-title">🏆 Season Leaderboard</div>
    <div class="lb-grid">${lbRows}</div>
    <div class="lb-section-title">📊 Top Grievances</div>
    <div class="cat-bar-card"><div class="cat-bar-title">By Category</div>${catBars}</div>
    ${ffSection}
  `;
}

// ── FX ────────────────────────────────────────────────────────────────
let stampTO = null;
function showStamp() {
  const el = document.getElementById('stampOverlay');
  document.getElementById('stampText').textContent = STAMPS[Math.floor(Math.random()*STAMPS.length)];
  el.style.display = 'block';
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'stampIn 0.4s ease forwards';
  if (stampTO) clearTimeout(stampTO);
  stampTO = setTimeout(()=>{
    el.style.animation = 'stampOut 0.3s ease forwards';
    setTimeout(()=>{ el.style.display='none'; }, 300);
  }, 900);
}
function pulseCard(name) {
  const c = document.getElementById(`card-${name}`);
  if (!c) return;
  c.classList.remove('pulsing'); c.offsetHeight;
  c.classList.add('pulsing');
  setTimeout(()=>c.classList.remove('pulsing'), 500);
}
function spawnConfetti() {
  for (let i=0;i<12;i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `left:${20+Math.random()*60}vw;top:-10px;background:${CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1+Math.random()}s;animation-delay:${Math.random()*0.3}s;border-radius:${Math.random()<.5?'50%':'2px'};`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 1600);
  }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
