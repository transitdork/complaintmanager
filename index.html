<title>Formal Complaints Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink:   #FF2D78;
  --yellow: #FFD100;
  --cyan:   #00CFEF;
  --orange: #FF7A00;
  --purple: #8B2FE8;
  --green:  #00C853;
  --navy:   #1A1235;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(145deg, #d6e8ff 0%, #e8d6ff 100%);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
  overflow-x: hidden;
}

/* SCREENS */
#screen-start   { display: none; flex-direction: column; align-items: center; padding-bottom: 24px; min-height: 100vh; }
#screen-session { display: none; flex-direction: column; min-height: 100vh; }
#screen-start.active   { display: flex; }
#screen-session.active { display: flex; }

/* START */
.start-logo-wrap { width:100%; max-width:560px; padding:18px 16px 4px; }
.start-logo-wrap img {
  width:100%; height:auto; display:block;
  border-radius:16px; border:3px solid var(--navy);
  box-shadow:5px 5px 0 var(--navy);
}
.start-card {
  background:white; border:3px solid var(--navy); border-radius:18px;
  box-shadow:5px 5px 0 var(--navy); padding:18px 16px;
  margin:12px 14px 0; width:calc(100% - 28px); max-width:500px;
}
.start-card h2 {
  font-family:'Fredoka One',cursive; font-size:1.05rem;
  color:var(--navy); margin-bottom:12px;
}
.date-row { display:flex; gap:8px; }
.date-input {
  flex:1; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800;
  border:3px solid var(--navy); border-radius:12px; padding:9px 12px;
  outline:none; box-shadow:3px 3px 0 var(--navy);
}
.date-input:focus { border-color:var(--pink); }
.btn-open {
  font-family:'Fredoka One',cursive; font-size:1rem;
  background:var(--pink); color:white; border:3px solid var(--navy);
  border-radius:12px; padding:9px 18px; cursor:pointer;
  box-shadow:3px 3px 0 var(--navy); white-space:nowrap;
}
.btn-open:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--navy); }
.prev-header { font-family:'Fredoka One',cursive; font-size:.95rem; color:var(--navy); margin-bottom:8px; }
.session-list { display:flex; flex-direction:column; gap:7px; }
.session-item {
  display:flex; align-items:center; gap:8px; background:white;
  border:3px solid var(--navy); border-radius:11px; padding:9px 12px;
  box-shadow:3px 3px 0 var(--navy); cursor:pointer;
}
.session-item:hover { background:#f0f8ff; }
.session-item:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--navy); }
.session-date { font-family:'Fredoka One',cursive; font-size:.9rem; flex:1; }
.session-count {
  font-family:'Fredoka One',cursive; font-size:.78rem;
  background:var(--pink); color:white; border:2px solid var(--navy);
  border-radius:10px; padding:2px 9px;
}
.session-del { background:none; border:none; font-size:1rem; cursor:pointer; opacity:.3; padding:2px 5px; }
.session-del:hover { opacity:1; }
.no-sessions { text-align:center; color:#aaa; font-size:.8rem; font-weight:700; padding:10px; }
.bottom-btns { display:flex; gap:8px; padding:10px 14px 0; width:100%; max-width:500px; }

/* SESSION HEADER */
.session-header {
  background:white; border-bottom:4px solid var(--navy); padding:10px 12px;
  display:flex; align-items:center; gap:8px;
  position:sticky; top:0; z-index:100; box-shadow:0 4px 0 var(--navy);
}
.back-btn {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:var(--yellow); color:var(--navy);
  border:3px solid var(--navy); border-radius:9px;
  padding:6px 11px; cursor:pointer; box-shadow:2px 2px 0 var(--navy); flex-shrink:0;
}
.back-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--navy); }
.session-title { flex:1; text-align:center; }
.st-main { font-family:'Fredoka One',cursive; font-size:.9rem; color:var(--pink); display:block; }
.st-date { font-size:.65rem; font-weight:800; color:var(--navy); opacity:.55; display:block; text-transform:uppercase; letter-spacing:.04em; }
.coach-btn {
  font-family:'Fredoka One',cursive; font-size:.8rem;
  border:3px solid var(--navy); border-radius:9px;
  padding:6px 10px; cursor:pointer; box-shadow:2px 2px 0 var(--navy); flex-shrink:0;
}
.coach-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--navy); }
.coach-btn.locked   { background:#f0f0f0; color:#888; }
.coach-btn.unlocked { background:var(--green); color:white; }

/* TABS */
.tab-bar { display:flex; background:white; border-bottom:3px solid var(--navy); }
.stab {
  flex:1; font-family:'Fredoka One',cursive; font-size:.8rem;
  padding:9px 4px; text-align:center; cursor:pointer;
  border-bottom:4px solid transparent; color:#888;
}
.stab.active { color:var(--pink); border-bottom-color:var(--pink); background:#fff3f8; }
.session-content { flex:1; padding:10px; }

/* PLAYER CARDS */
.players-stack { display:flex; flex-direction:column; gap:10px; }
.player-card {
  background:white; border:3px solid var(--navy);
  border-radius:14px; overflow:hidden; box-shadow:4px 4px 0 var(--navy);
}
.player-card.pulsing { animation:cardPulse .4s ease; }
.player-header {
  display:flex; align-items:center; gap:10px;
  padding:11px 13px; cursor:pointer; user-select:none;
}
.player-header:active { filter:brightness(.95); }
.player-arrow {
  font-size:.85rem; flex-shrink:0; color:var(--navy);
  display:inline-block;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.player-card.open .player-arrow { transform:rotate(90deg); }
.player-name { font-family:'Fredoka One',cursive; font-size:1.05rem; color:var(--navy); flex:1; }
.player-totals { display:flex; gap:5px; flex-shrink:0; align-items:center; }
.ptotal-pill {
  font-family:'Fredoka One',cursive; font-size:.75rem;
  border:2px solid var(--navy); border-radius:14px; padding:2px 10px; white-space:nowrap;
}
.ptotal-pill.cats  { background:var(--pink);   color:white; }
.ptotal-pill.ff    { background:var(--purple);  color:white; }
.ptotal-pill.zero  { background:#e8e8e8; color:#aaa; }
.player-body { display:none; border-top:3px solid var(--navy); }
.player-card.open .player-body { display:block; }

/* COMPLAINT ROWS */
.complaint-row {
  display:flex; align-items:center; gap:7px;
  padding:7px 12px; border-bottom:2px solid #f0f0f0;
}
.c-emoji { font-size:1rem; width:22px; text-align:center; flex-shrink:0; }
.c-label { flex:1; font-size:.76rem; font-weight:800; color:var(--navy); }
.c-controls { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.cnt-btn {
  width:28px; height:28px; border-radius:8px; border:2px solid var(--navy);
  font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:2px 2px 0 var(--navy); font-family:'Fredoka One',cursive;
}
.cnt-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--navy); }
.cnt-btn.minus { background:#f5f5f5; color:var(--navy); }
.cnt-btn.plus  { background:var(--pink); color:white; }
.c-count { font-family:'Fredoka One',cursive; font-size:.95rem; min-width:22px; text-align:center; color:#ccc; }
.c-count.nz { color:var(--pink); }

/* FREEFORM */
.freeform-section {
  padding:8px 12px 12px; background:#FAFAFF; border-top:2px solid #f0f0f0;
}
.ff-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.ff-label { font-size:.68rem; font-weight:900; color:var(--purple); text-transform:uppercase; letter-spacing:.04em; }
.ff-add-btn {
  font-family:'Fredoka One',cursive; font-size:.78rem;
  background:var(--purple); color:white; border:2px solid var(--navy);
  border-radius:8px; padding:4px 11px; cursor:pointer; box-shadow:2px 2px 0 var(--navy);
}
.ff-add-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 var(--navy); }
.ff-entries { display:flex; flex-direction:column; gap:5px; }
.ff-entry { display:flex; gap:5px; align-items:flex-start; }
.ff-input {
  flex:1; border:2px solid #ddd; border-radius:8px; padding:6px 9px;
  font-family:'Nunito',sans-serif; font-size:.78rem; font-weight:700;
  color:var(--navy); background:white; outline:none; resize:none; min-height:46px;
}
.ff-input:focus { border-color:var(--purple); }
.ff-input::placeholder { color:#ccc; }
.ff-del-btn { background:none; border:none; font-size:1rem; cursor:pointer; opacity:.3; padding:4px; margin-top:3px; }
.ff-del-btn:hover { opacity:.9; }
.filter-badge {
  display:inline-block; background:var(--orange); color:white;
  border:2px solid var(--navy); border-radius:8px;
  font-size:.62rem; font-weight:900; padding:1px 7px; margin-top:3px;
  animation:badgePop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes badgePop { 0%{transform:scale(0)} 100%{transform:scale(1)} }

/* SEASON */
.lb-section-title {
  font-family:'Fredoka One',cursive; font-size:.95rem; color:var(--navy);
  margin:0 0 7px; padding:5px 0 3px; border-bottom:3px solid var(--navy);
}
.lb-grid { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.lb-row {
  display:flex; align-items:center; gap:7px; background:white;
  border:3px solid var(--navy); border-radius:11px; padding:8px 11px;
  box-shadow:3px 3px 0 var(--navy);
}
.lb-rank { font-family:'Fredoka One',cursive; font-size:1.05rem; width:26px; text-align:center; }
.lb-name { flex:1; font-weight:900; font-size:.88rem; }
.lb-num  { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--pink); }
.lb-chips { display:flex; flex-wrap:wrap; gap:3px; padding:3px 11px 7px 44px; }
.lb-chip {
  background:#f0e8ff; border:2px solid var(--navy); border-radius:20px;
  font-size:.6rem; font-weight:800; padding:2px 6px; display:flex; align-items:center; gap:2px;
}
.chip-cnt { color:var(--orange); font-family:'Fredoka One',cursive; }
.cat-bar-card {
  background:white; border:3px solid var(--navy); border-radius:12px;
  overflow:hidden; box-shadow:3px 3px 0 var(--navy); margin-bottom:14px;
}
.cat-bar-title {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  padding:7px 11px; background:var(--cyan); border-bottom:3px solid var(--navy);
}
.cat-bar-row {
  display:flex; align-items:center; gap:7px; padding:6px 11px;
  border-bottom:2px solid #f0f0f0; font-size:.72rem; font-weight:800;
}
.cat-bar-row:last-child { border-bottom:none; }
.bar-wrap { flex:1; height:11px; background:#f0f0f0; border-radius:6px; overflow:hidden; }
.bar-fill { height:100%; background:var(--orange); border-radius:6px; }
.bar-cnt { font-family:'Fredoka One',cursive; font-size:.88rem; color:var(--orange); min-width:20px; text-align:right; }
.ff-history-card {
  background:white; border:3px solid var(--navy); border-radius:12px;
  overflow:hidden; box-shadow:3px 3px 0 var(--navy); margin-bottom:14px;
}
.fh-title {
  font-family:'Fredoka One',cursive; font-size:.88rem;
  padding:7px 11px; background:var(--purple); color:white; border-bottom:3px solid var(--navy);
}
.fh-row { padding:7px 11px; border-bottom:2px solid #f5f0ff; }
.fh-row:last-child { border-bottom:none; }
.fh-who { font-weight:900; color:var(--purple); font-size:.7rem; }
.fh-text { color:var(--navy); font-weight:700; font-size:.78rem; margin-top:2px; font-style:italic; }
.ff-locked-note { padding:14px; text-align:center; font-size:.78rem; font-weight:800; color:#aaa; font-style:italic; }

/* SHARED */
.btn {
  font-family:'Fredoka One',cursive; font-size:.82rem; padding:7px 13px;
  border:3px solid var(--navy); border-radius:10px; cursor:pointer;
  box-shadow:3px 3px 0 var(--navy);
}
.btn:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--navy); }
.btn-pink   { background:var(--pink);   color:white; }
.btn-yellow { background:var(--yellow); color:var(--navy); }
.btn-cyan   { background:var(--cyan);   color:var(--navy); }

/* STAMP */
@keyframes stampIn {
  0%   { transform:translate(-50%,-50%) scale(3) rotate(-12deg); opacity:0; }
  60%  { transform:translate(-50%,-50%) scale(.9) rotate(3deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1) rotate(0); opacity:1; }
}
@keyframes stampOut { to { opacity:0; transform:translate(-50%,-60%) scale(.5); } }
.stamp-overlay {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:9999; pointer-events:none; display:none;
}
.stamp-text {
  font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--pink);
  border:5px solid var(--pink); border-radius:12px; padding:6px 14px;
  background:white; transform:rotate(-8deg); box-shadow:4px 4px 0 var(--navy); white-space:nowrap;
}
.confetti-piece {
  position:fixed; pointer-events:none; z-index:9998; border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}
@keyframes cardPulse {
  0%,100% { box-shadow:4px 4px 0 var(--navy); }
  50%     { box-shadow:4px 4px 0 var(--navy), 0 0 18px var(--pink); }
}

/* PIN MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(26,18,53,.75); z-index:500;
  align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:white; border:4px solid var(--navy); border-radius:18px;
  padding:24px; box-shadow:8px 8px 0 var(--navy);
  max-width:300px; width:100%; text-align:center;
}
.modal h2 { font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--purple); margin-bottom:6px; }
.modal p  { font-size:.78rem; color:#666; margin-bottom:12px; }
.pin-input {
  width:100%; font-family:'Fredoka One',cursive; font-size:1.5rem;
  text-align:center; letter-spacing:.3em; border:3px solid var(--navy);
  border-radius:12px; padding:10px; outline:none; margin-bottom:12px;
  box-shadow:3px 3px 0 var(--navy);
}
.pin-error { color:var(--pink); font-size:.75rem; font-weight:800; margin-bottom:8px; display:none; }
.modal-btns { display:flex; gap:8px; justify-content:center; }

@media(max-width:380px){ .c-label{font-size:.7rem} .cnt-btn{width:25px;height:25px} }
@keyframes toastIn { 0%{transform:translateX(-50%) translateY(20px);opacity:0} 100%{transform:translateX(-50%) translateY(0);opacity:1} }
</style>
</head>
<body>

<div class="stamp-overlay" id="stampOverlay">
  <div class="stamp-text" id="stampText">COMPLAINT LODGED!</div>
</div>

<div class="modal-overlay" id="pinModal">
  <div class="modal">
    <h2>&#x1F510; Coach Access</h2>
    <p>Enter PIN to view private complaints</p>
    <div class="pin-error" id="pinError">Wrong PIN! Try again</div>
    <input type="password" inputmode="numeric" maxlength="8" class="pin-input" id="pinInput" placeholder="&bull;&bull;&bull;&bull;">
    <div class="modal-btns">
      <button class="btn btn-yellow" id="btnCancelPin">Cancel</button>
      <button class="btn" style="background:var(--purple);color:white" id="btnSubmitPin">Unlock</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── CONFIG ──────────────────────────────────────────────────────────
  var COACH_PIN = '1234'; // change this to your PIN

  var PLAYERS = ['Ada','Hattie','Ivy','Izzy','Lily','Maddy','Saskia','Quinn'];

  var CATS = [
    {id:'uneven', emoji:'[EQ]',  label:'Uneven teams'},
    {id:'ref',    emoji:'[BB]',  label:'Unfair ref'},
    {id:'laps',   emoji:'[RUN]', label:'Made me run laps'},
    {id:'shoes',  emoji:'[SH]',  label:'Slow to put on shoes'},
    {id:'taller', emoji:'[RU]',  label:'Claiming someone is taller'},
    {id:'drinks', emoji:'[H2O]', label:'Not enough drink breaks'}
  ];

  var CAT_EMOJI = {uneven:'⚖️', ref:'🏀', laps:'🏃', shoes:'👟', taller:'📏', drinks:'💧'};

  var CARD_BG = [
    '#FF2D7815','#FFD10020','#00CFEF18','#FF7A0015',
    '#8B2FE815','#00C85315','#FF2D7815','#FFD10020','#E040FB15'
  ];

  var STAMPS = [
    'COMPLAINT LODGED!','OFFICIALLY NOTED!',
    'ON THE RECORD!','GRIEVANCE FILED!',
    'VERY SERIOUS!','UNACCEPTABLE!',
    'RECEIVED & PROCESSED!'
  ];

  var BAD = ['shit','fuck','crap','ass','bitch','bastard','piss','dick',
    'cock','pussy','cunt','twat','wank','arse','bollocks','bugger',
    'bloody','idiot','stupid','moron','dumb','ugly','loser','freak'];

  var REPLACE = ['Mango','Papaya','Dragonfruit','Kiwi','Lychee','Passionfruit',
    'Guava','Starfruit','Pomelo','Jackfruit','Rambutan','Persimmon','Kumquat',
    'Pikachu','Yoshi','Kirby','Toad','Bowser','Waluigi','Wario','Birdo',
    'Koopa','Goomba','Boo','Lakitu','Wiggler','Rosalina','Diddy',
    'Petunia','Dahlia','Begonia','Zinnia','Lupin','Foxglove','Larkspur',
    'Wisteria','Lobelia','Nemesia','Salvia','Verbena','Candytuft'];

  // ── STATE ────────────────────────────────────────────────────────────
  var db = {};        // db[dateStr][playerName] = {cats:{id:n}, freeforms:[{text}]}
  var curDate = '';
  var curTab  = 'lodge';
  var coach   = false;

  function save() {
    try { localStorage.setItem('fcm_v4', JSON.stringify(db)); } catch(e) {}
  }
  function load() {
    try {
      var d = localStorage.getItem('fcm_v4');
      if (d) db = JSON.parse(d);
    } catch(e) { db = {}; }
  }

  function ensurePlayer(date, name) {
    if (!db[date]) db[date] = {};
    if (!db[date][name]) db[date][name] = {cats:{}, freeforms:[]};
    if (!db[date][name].cats) db[date][name].cats = {};
    if (!db[date][name].freeforms) db[date][name].freeforms = [];
  }

  function catTotal(date, name) {
    var p = db[date] && db[date][name];
    if (!p || !p.cats) return 0;
    var t = 0;
    CATS.forEach(function(c) { t += (p.cats[c.id] || 0); });
    return t;
  }

  function ffLen(date, name) {
    var p = db[date] && db[date][name];
    return (p && p.freeforms) ? p.freeforms.length : 0;
  }

  function sessionTotal(date) {
    var t = 0;
    PLAYERS.forEach(function(n) { t += catTotal(date, n); });
    t += catTotal(date, '__anon__');
    return t;
  }

  // ── DATES ────────────────────────────────────────────────────────────
  function todayStr() {
    var d = new Date();
    var m = d.getMonth() + 1;
    var day = d.getDate();
    return d.getFullYear() + '-' + (m<10?'0':'') + m + '-' + (day<10?'0':'') + day;
  }

  function fmtDate(s) {
    try {
      return new Date(s + 'T12:00:00').toLocaleDateString('en-AU',
        {weekday:'short', day:'numeric', month:'short', year:'numeric'});
    } catch(e) { return s; }
  }

  // ── SCREENS ──────────────────────────────────────────────────────────
  function showStart() {
    ge('screen-session').classList.remove('active');
    ge('screen-start').classList.add('active');
    renderSessionList();
  }

  function showSession(date) {
    curDate = date;
    PLAYERS.forEach(function(n) { ensurePlayer(date, n); });
    ensurePlayer(date, '__anon__');
    save();
    ge('sessionHeaderDate').textContent = fmtDate(date);
    ge('screen-start').classList.remove('active');
    ge('screen-session').classList.add('active');
    switchTab('lodge');
  }

  function renderSessionList() {
    var list = ge('sessionList');
    var dates = Object.keys(db).filter(function(k) {
      return k.indexOf('__') !== 0;
    }).sort(function(a,b) { return b > a ? 1 : -1; });

    if (!dates.length) {
      list.innerHTML = '<div class="no-sessions">No sessions yet — open one above!</div>';
      return;
    }

    list.innerHTML = '';
    dates.forEach(function(d) {
      var t  = sessionTotal(d);
      var ff = PLAYERS.concat(['__anon__']).reduce(function(s,n){ return s+ffLen(d,n); }, 0);
      var lbl = t + (ff ? ' + '+ff+' private' : '') + ' complaint' + ((t+ff)!==1 ? 's' : '');

      var row = document.createElement('div');
      row.className = 'session-item';
      row.innerHTML =
        '<span style="font-size:1.1rem">&#x1F4C5;</span>' +
        '<span class="session-date">' + fmtDate(d) + '</span>' +
        '<span class="session-count">' + lbl + '</span>' +
        '<button class="session-del" data-deldate="' + d + '">&#x1F5D1;</button>';
      row.addEventListener('click', function(e) {
        if (e.target.getAttribute('data-deldate')) return;
        showSession(d);
      });
      list.appendChild(row);
    });

  // ── TAB SWITCH ───────────────────────────────────────────────────────
  function switchTab(tab) {
    curTab = tab;
    ge('stab-lodge').classList.toggle('active',  tab === 'lodge');
    ge('stab-season').classList.toggle('active', tab === 'season');
    ge('view-lodge').style.display  = tab === 'lodge'  ? '' : 'none';
    ge('view-season').style.display = tab === 'season' ? '' : 'none';
    if (tab === 'lodge')  renderPlayers();
    if (tab === 'season') renderSeason();

  // ── RENDER PLAYERS ───────────────────────────────────────────────────
  function renderPlayers() {
    var container = ge('view-lodge');
    container.innerHTML = '';
    var stack = document.createElement('div');
    stack.className = 'players-stack';

    var allPlayers = PLAYERS.concat(['__anon__']);
    allPlayers.forEach(function(name, pi) {
      var isAnon = (name === '__anon__');
      var pd = (db[curDate] && db[curDate][name]) || {cats:{}, freeforms:[]};
      var cats = pd.cats || {};
      var ffs  = pd.freeforms || [];
      var ct   = 0;
      CATS.forEach(function(c) { ct += (cats[c.id] || 0); });
      var ffc  = ffs.length;
      var wasOpen = ct > 0 || ffc > 0;

      // Build card
      var card = document.createElement('div');
      card.className = 'player-card' + (wasOpen ? ' open' : '');
      card.setAttribute('data-player', name);

      // Header
      var header = document.createElement('div');
      header.className = 'player-header';
      header.style.background = CARD_BG[pi % CARD_BG.length];

      var arrow = document.createElement('span');
      arrow.className = 'player-arrow';
      arrow.textContent = '▶';

      var nameEl = document.createElement('span');
      nameEl.className = 'player-name';
      nameEl.textContent = isAnon ? '🕵️ Anonymous' : name;

      var pillsEl = document.createElement('div');
      pillsEl.className = 'player-totals';
      pillsEl.setAttribute('data-pills', name);
      updatePillsEl(pillsEl, name, ct, ffc, isAnon);

      header.appendChild(arrow);
      header.appendChild(nameEl);
      header.appendChild(pillsEl);
      header.addEventListener('click', function() {
        card.classList.toggle('open');
      });

      // Body
      var body = document.createElement('div');
      body.className = 'player-body';

      // Category rows (not for anon)
      if (!isAnon) {
        CATS.forEach(function(c) {
          var cnt = cats[c.id] || 0;
          var row = document.createElement('div');
          row.className = 'complaint-row';

          var emoji = document.createElement('span');
          emoji.className = 'c-emoji';
          emoji.textContent = CAT_EMOJI[c.id];

          var label = document.createElement('span');
          label.className = 'c-label';
          label.textContent = c.label;

          var controls = document.createElement('div');
          controls.className = 'c-controls';

          var minusBtn = document.createElement('button');
          minusBtn.className = 'cnt-btn minus';
          minusBtn.textContent = '−';
          minusBtn.setAttribute('data-action', 'cat');
          minusBtn.setAttribute('data-player', name);
          minusBtn.setAttribute('data-cat', c.id);
          minusBtn.setAttribute('data-delta', '-1');

          var countEl = document.createElement('span');
          countEl.className = 'c-count' + (cnt > 0 ? ' nz' : '');
          countEl.textContent = cnt;
          countEl.setAttribute('data-countfor', name + '_' + c.id);

          var plusBtn = document.createElement('button');
          plusBtn.className = 'cnt-btn plus';
          plusBtn.textContent = '+';
          plusBtn.setAttribute('data-action', 'cat');
          plusBtn.setAttribute('data-player', name);
          plusBtn.setAttribute('data-cat', c.id);
          plusBtn.setAttribute('data-delta', '1');

          controls.appendChild(minusBtn);
          controls.appendChild(countEl);
          controls.appendChild(plusBtn);

          row.appendChild(emoji);
          row.appendChild(label);
          row.appendChild(controls);
          body.appendChild(row);
        });
      }

      // Freeform section
      var ffSection = document.createElement('div');
      ffSection.className = 'freeform-section';

      var ffHeader = document.createElement('div');
      ffHeader.className = 'ff-header';

      var ffLabel = document.createElement('div');
      ffLabel.className = 'ff-label';
      ffLabel.textContent = '🔒 Private complaints';

      var addBtn = document.createElement('button');
      addBtn.className = 'ff-add-btn';
      addBtn.textContent = '+ Add';
      addBtn.setAttribute('data-action', 'addff');
      addBtn.setAttribute('data-player', name);

      ffHeader.appendChild(ffLabel);
      ffHeader.appendChild(addBtn);

      var ffEntries = document.createElement('div');
      ffEntries.className = 'ff-entries';
      ffEntries.setAttribute('data-fflist', name);

      ffs.forEach(function(ff, fi) {
        ffEntries.appendChild(makeFfEntry(name, fi, ff.text || ''));
      });

      ffSection.appendChild(ffHeader);

      body.appendChild(ffSection);

      card.appendChild(header);
      card.appendChild(body);
      stack.appendChild(card);
    });

    container.appendChild(stack);

  function makeFfEntry(playerName, index, text) {
    var entry = document.createElement('div');
    entry.className = 'ff-entry';

    var ta = document.createElement('textarea');
    ta.className = 'ff-input';
    ta.rows = 2;
    ta.placeholder = 'Type formal grievance...';
    ta.value = text;
    ta.setAttribute('data-action', 'saveff');
    ta.setAttribute('data-player', playerName);
    ta.setAttribute('data-index', index);

    var delBtn = document.createElement('button');
    delBtn.className = 'ff-del-btn';
    delBtn.textContent = '✕';
    delBtn.setAttribute('data-action', 'delff');
    delBtn.setAttribute('data-player', playerName);
    delBtn.setAttribute('data-index', index);

    entry.appendChild(ta);
    entry.appendChild(delBtn);
    return entry;
  }

  // ── EVENT DELEGATION ─────────────────────────────────────────────────
  document.addEventListener('click', function(e) {
    var action = e.target.getAttribute('data-action');
    if (!action) {
      // Delete session button
      var del = e.target.getAttribute('data-deldate');
      if (del) {
        e.stopPropagation();
        if (confirm('Delete session for ' + fmtDate(del) + '?')) {
          delete db[del];
          save();
          renderSessionList();
        }
      }
      return;
    }

    if (action === 'cat') {
      e.stopPropagation();
      var player = e.target.getAttribute('data-player');
      var catId  = e.target.getAttribute('data-cat');
      var delta  = parseInt(e.target.getAttribute('data-delta'), 10);
      adjustCat(player, catId, delta);
    }

    if (action === 'addff') {
      e.stopPropagation();
      var player = e.target.getAttribute('data-player');
      ensurePlayer(curDate, player);
      db[curDate][player].freeforms.push({text:''});
      save();
      // Re-render just this player's ff list
      var list = document.querySelector('[data-fflist="' + player + '"]');
      if (list) {
        var idx = db[curDate][player].freeforms.length - 1;
        var entry = makeFfEntry(player, idx, '');
        list.appendChild(entry);
        var ta = entry.querySelector('textarea');
        if (ta) ta.focus();
      }
      refreshPills(player);
    }

    if (action === 'delff') {
      e.stopPropagation();
      var player = e.target.getAttribute('data-player');
      var idx    = parseInt(e.target.getAttribute('data-index'), 10);
      ensurePlayer(curDate, player);
      db[curDate][player].freeforms.splice(idx, 1);
      save();
      // Rebuild ff list for this player
      rebuildFfList(player);
      refreshPills(player);
    }
  });

  document.addEventListener('blur', function(e) {
    if (e.target.getAttribute('data-action') !== 'saveff') return;
    var player = e.target.getAttribute('data-player');
    var idx    = parseInt(e.target.getAttribute('data-index'), 10);
    var raw    = e.target.value;
    var result = filterText(raw);
    if (result.text !== raw) {
      e.target.value = result.text;
      if (result.count > 0) {
        var badge = document.createElement('div');
        badge.className = 'filter-badge';
        badge.textContent = result.count + ' word' + (result.count > 1 ? 's' : '') + ' upgraded 🌸';
        e.target.parentNode.parentNode.appendChild(badge);
        setTimeout(function() { if (badge.parentNode) badge.parentNode.removeChild(badge); }, 2500);
      }
    }
    ensurePlayer(curDate, player);
    if (db[curDate][player].freeforms[idx] !== undefined) {
      db[curDate][player].freeforms[idx].text = result.text;
      save();
    }
    refreshPills(player);
  }, true); // capture phase for blur

  // ── ADJUST CAT ───────────────────────────────────────────────────────
  function adjustCat(player, catId, delta) {
    ensurePlayer(curDate, player);
    var cur = db[curDate][player].cats[catId] || 0;
    var val = Math.max(0, cur + delta);
    db[curDate][player].cats[catId] = val;
    save();

    // Update count display
    var countEl = document.querySelector('[data-countfor="' + player + '_' + catId + '"]');
    if (countEl) {
      countEl.textContent = val;
      countEl.className = 'c-count' + (val > 0 ? ' nz' : '');
    }

    refreshPills(player);
    if (delta > 0) { stamp(); pulseCard(player); if (Math.random() < 0.3) confetti(); }
  }

  // ── REFRESH PILLS ────────────────────────────────────────────────────
  function refreshPills(player) {
    var pillsEl = document.querySelector('[data-pills="' + player + '"]');
    if (!pillsEl) return;
    var pd   = (db[curDate] && db[curDate][player]) || {cats:{}, freeforms:[]};
    var ct   = 0;
    CATS.forEach(function(c) { ct += (pd.cats && pd.cats[c.id]) || 0; });
    var ffc  = (pd.freeforms || []).length;
    var isAnon = player === '__anon__';
    updatePillsEl(pillsEl, player, ct, ffc, isAnon);
  }

  function updatePillsEl(el, name, ct, ffc, isAnon) {
    el.innerHTML = '';
    if (!isAnon && ct > 0) {
      var p = document.createElement('span');
      p.className = 'ptotal-pill cats';
      p.textContent = ct;
      el.appendChild(p);
    }
    if (ffc > 0) {
      var p = document.createElement('span');
      p.className = 'ptotal-pill ff';
      p.textContent = ffc + ' private';
      el.appendChild(p);
    }
    if (ct === 0 && ffc === 0) {
      var p = document.createElement('span');
      p.className = 'ptotal-pill zero';
      p.textContent = 'No complaints';
      el.appendChild(p);
    }
  }

  function rebuildFfList(player) {
    var list = document.querySelector('[data-fflist="' + player + '"]');
    if (!list) return;
    list.innerHTML = '';
    var ffs = (db[curDate] && db[curDate][player] && db[curDate][player].freeforms) || [];
    ffs.forEach(function(ff, i) {
      list.appendChild(makeFfEntry(player, i, ff.text || ''));
    });
  }

  // ── PROFANITY FILTER ─────────────────────────────────────────────────
  function filterText(text) {
    var out = text;
    var count = 0;
    BAD.forEach(function(word) {
      var re = new RegExp('\b' + word + 's?\b', 'gi');
      out = out.replace(re, function() {
        count++;
        return REPLACE[Math.floor(Math.random() * REPLACE.length)];
      });
    });
    return {text: out, count: count};
  }

  // ── SEASON ───────────────────────────────────────────────────────────
  function renderSeason() {
    var el = ge('view-season');
    var allDates = Object.keys(db).filter(function(k) { return k.indexOf('__') !== 0; }).sort();
    el.innerHTML = '';

    var playerStats = PLAYERS.map(function(name) {
      var catTotals = {};
      CATS.forEach(function(c) {
        catTotals[c.id] = allDates.reduce(function(s,d) {
          return s + ((db[d] && db[d][name] && db[d][name].cats && db[d][name].cats[c.id]) || 0);
        }, 0);
      });
      var grand = 0;
      CATS.forEach(function(c) { grand += catTotals[c.id]; });
      return {name:name, catTotals:catTotals, grand:grand};
    }).sort(function(a,b) { return b.grand - a.grand; });

    var rankEmoji = ['🥇','🥈','🥉'];
    var lbDiv = document.createElement('div');
    lbDiv.innerHTML = '<div class="lb-section-title">🏆 Season Leaderboard</div>';
    var grid = document.createElement('div');
    grid.className = 'lb-grid';

    playerStats.forEach(function(pd, i) {
      var row = document.createElement('div');
      row.innerHTML =
        '<div class="lb-row">' +
          '<span class="lb-rank">' + (i < 3 ? rankEmoji[i] : (i+1)+'.') + '</span>' +
          '<span class="lb-name">' + pd.name + '</span>' +
          '<span class="lb-num">' + pd.grand + '</span>' +
        '</div>';
      var chipsHtml = '';
      CATS.forEach(function(c) {
        if (pd.catTotals[c.id] > 0) {
          chipsHtml += '<span class="lb-chip">' + CAT_EMOJI[c.id] + ' ' + c.label +
            ' <span class="chip-cnt">&times;' + pd.catTotals[c.id] + '</span></span>';
        }
      });
      if (chipsHtml) {
        row.innerHTML += '<div class="lb-chips">' + chipsHtml + '</div>';
      }
      grid.appendChild(row);
    });
    lbDiv.appendChild(grid);
    el.appendChild(lbDiv);

    // Cat bars
    var catStats = CATS.map(function(c) {
      var sum = allDates.reduce(function(s,d) {
        return s + PLAYERS.concat(['__anon__']).reduce(function(ss,p) {
          return ss + ((db[d]&&db[d][p]&&db[d][p].cats&&db[d][p].cats[c.id]) || 0);
        }, 0);
      }, 0);
      return {emoji:CAT_EMOJI[c.id], label:c.label, sum:sum};
    }).sort(function(a,b) { return b.sum - a.sum; });
    var maxCat = catStats[0] ? Math.max(catStats[0].sum, 1) : 1;

    var catDiv = document.createElement('div');
    catDiv.innerHTML = '<div class="lb-section-title">📊 Top Grievances</div>';
    var barCard = document.createElement('div');
    barCard.className = 'cat-bar-card';
    barCard.innerHTML = '<div class="cat-bar-title">By category — all sessions</div>';
    catStats.forEach(function(c) {
      var r = document.createElement('div');
      r.className = 'cat-bar-row';
      r.innerHTML =
        '<span style="font-size:.9rem;width:20px;text-align:center">' + c.emoji + '</span>' +
        '<span style="flex:1;font-size:.7rem;font-weight:800">' + c.label + '</span>' +
        '<div class="bar-wrap"><div class="bar-fill" style="width:' + Math.round(c.sum/maxCat*100) + '%"></div></div>' +
        '<span class="bar-cnt">' + c.sum + '</span>';
      barCard.appendChild(r);
    });
    catDiv.appendChild(barCard);
    el.appendChild(catDiv);

    // Private ff - coach only
    var allFf = [];
    allDates.slice().reverse().forEach(function(d) {
      PLAYERS.concat(['__anon__']).forEach(function(p) {
        var ffs = (db[d] && db[d][p] && db[d][p].freeforms) || [];
        ffs.forEach(function(ff) {
          if (ff.text && ff.text.trim()) {
            allFf.push({date:d, name:(p==='__anon__'?'Anonymous':p), text:ff.text});
          }
        });
      });
    });

    if (allFf.length) {
      var ffDiv = document.createElement('div');
      if (coach) {
        ffDiv.innerHTML = '<div class="lb-section-title">🔒 Private Grievances (Coach View)</div>';
        var card = document.createElement('div');
        card.className = 'ff-history-card';
        card.innerHTML = '<div class="fh-title">🔐 Confidential Complaints</div>';
        allFf.forEach(function(e) {
          var row = document.createElement('div');
          row.className = 'fh-row';
          row.innerHTML =
            '<div class="fh-who">' + esc(e.name) + ' <span style="font-size:.62rem;color:#aaa;font-weight:700">&mdash; ' + fmtDate(e.date) + '</span></div>' +
            '<div class="fh-text">&ldquo;' + esc(e.text) + '&rdquo;</div>';
          card.appendChild(row);
        });
        ffDiv.appendChild(card);
      } else {
        ffDiv.innerHTML =
          '<div class="lb-section-title">🔒 Private Grievances</div>' +
          '<div class="ff-history-card"><div class="ff-locked-note">🔐 ' + allFf.length +
          ' private complaint' + (allFf.length!==1?'s':'') +
          ' on file. Tap Coach to unlock.</div></div>';
      }
      el.appendChild(ffDiv);
    }

    // Summary pills
    var totalSessions = allDates.length;
    var grandTotal = playerStats.reduce(function(s,p){return s+p.grand;},0);
    var summary = document.createElement('div');
    summary.style.cssText = 'display:flex;gap:7px;margin-bottom:12px;';
    summary.innerHTML =
      '<div style="background:var(--pink);color:white;border:3px solid var(--navy);border-radius:11px;padding:6px 12px;box-shadow:2px 2px 0 var(--navy);font-family:Fredoka One,cursive;font-size:.85rem;flex:1;text-align:center">' +
        totalSessions + ' session' + (totalSessions!==1?'s':'') + '</div>' +
      '<div style="background:var(--yellow);color:var(--navy);border:3px solid var(--navy);border-radius:11px;padding:6px 12px;box-shadow:2px 2px 0 var(--navy);font-family:Fredoka One,cursive;font-size:.85rem;flex:1;text-align:center">' +
        grandTotal + ' complaints</div>';
    el.insertBefore(summary, el.firstChild);
  }

  // ── FX ───────────────────────────────────────────────────────────────
  var stampTO = null;
  function stamp() {
    var el = ge('stampOverlay');
    ge('stampText').textContent = STAMPS[Math.floor(Math.random() * STAMPS.length)];
    el.style.display = 'block';
    el.style.animation = 'none';

  function pulseCard(name) {

    if (!c) return;

    c.offsetHeight;
    c.classList.add('pulsing');

  function confetti() {
    var cols = ['#FF2D78','#FFD100','#00CFEF','#FF7A00','#8B2FE8'];
    for (var i = 0; i < 12; i++) {
      var c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = (20 + Math.random()*60) + 'vw';
      c.style.top = '-10px';
      c.style.background = cols[Math.floor(Math.random()*cols.length)];
      c.style.width  = (6 + Math.random()*8) + 'px';
      c.style.height = (6 + Math.random()*8) + 'px';
      c.style.animationDuration  = (1 + Math.random()) + 's';
      c.style.animationDelay     = (Math.random()*.3) + 's';
      c.style.borderRadius = Math.random() < .5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(function(){ if(c.parentNode) c.parentNode.removeChild(c); }, 1600);
    }
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  ge('btnOpenSession').addEventListener('click', function() {

    if (!val) { alert('Pick a date first!'); return; }

  // ── BACKUP & RESTORE ─────────────────────────────────────────────────
  function showToast(msg, duration) {
    var t = ge('backupToast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.animation = 'none';
    t.offsetHeight;
    t.style.animation = 'toastIn .3s cubic-bezier(.34,1.56,.64,1)';
    setTimeout(function() { t.style.display = 'none'; }, duration || 2500);
  }

  ge('btnExport').addEventListener('click', function() {
    try {
      var payload = {
        version: 1,
        exported: new Date().toISOString(),
        data: db
      };
      var json = JSON.stringify(payload, null, 2);
      var blob = new Blob([json], {type: 'application/json'});
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      // Filename: fcm-backup-YYYY-MM-DD.json
      var today = todayStr();
      a.href = url;
      a.download = 'fcm-backup-' + today + '.json';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
      showToast('✅ Backup saved!');
    } catch(e) {
      showToast('❌ Export failed: ' + e.message, 4000);
    }
  });

  ge('btnImportTrigger').addEventListener('click', function() {
    ge('fileInput').value = ''; // reset so same file can be re-selected
    ge('fileInput').click();
  });

  ge('fileInput').addEventListener('change', function() {
    var file = this.files && this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var parsed = JSON.parse(e.target.result);
        // Accept either {version,data:{...}} or a raw data object
        var incoming = (parsed.version && parsed.data) ? parsed.data : parsed;

        if (typeof incoming !== 'object' || Array.isArray(incoming)) {
          throw new Error('Unrecognised file format');
        }

        // Count sessions in the backup
        var sessionCount = Object.keys(incoming).filter(function(k) {
          return k.indexOf('__') !== 0;
        }).length;

        var msg = 'Restore ' + sessionCount + ' session' + (sessionCount!==1?'s':'') +
          ' from this backup?\n\nThis will MERGE with your current data — existing sessions are kept, backup sessions are added. Nothing is deleted.';

        if (!confirm(msg)) return;

        // Merge: backup sessions fill in any gaps; existing data wins on conflict
        Object.keys(incoming).forEach(function(date) {
          if (!db[date]) {
            db[date] = incoming[date];
          } else {
            // Merge players within date
            Object.keys(incoming[date]).forEach(function(player) {
              if (!db[date][player]) {
                db[date][player] = incoming[date][player];
              }
              // Don't overwrite existing player data — keep current device's version
            });
          }
        });

        save();
        renderSessionList();
        showToast('✅ Restored ' + sessionCount + ' session' + (sessionCount!==1?'s':'') + '!', 3000);
      } catch(err) {
        showToast('❌ Could not read file: ' + err.message, 4000);
      }
    };
    reader.onerror = function() { showToast('❌ File read failed', 3000); };
    reader.readAsText(file);
  });

  ge('btnSeasonView').addEventListener('click', function() {
    curDate = '__season__';
    ge('sessionHeaderDate').textContent = 'Full Season';
    ge('screen-start').classList.remove('active');
    ge('screen-session').classList.add('active');
    ge('stab-lodge').style.display = 'none';
    switchTab('season');
  });

  ge('btnBack').addEventListener('click', function() {
    ge('stab-lodge').style.display = '';
  });

  ge('coachBtn').addEventListener('click', function() {
    if (coach) {
      coach = false;
      updateCoachBtn();
      if (curTab === 'lodge')  renderPlayers();
      if (curTab === 'season') renderSeason();
    } else {
      openPin();
    }
  });

  ge('btnCancelPin').addEventListener('click', closePin);
  ge('btnSubmitPin').addEventListener('click', submitPin);
  ge('pinInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitPin();
  });
  ge('pinModal').addEventListener('click', function(e) {
    if (e.target === this) closePin();
  });

  ge('stab-lodge').addEventListener('click',  function() { switchTab('lodge'); });
  ge('stab-season').addEventListener('click', function() { switchTab('season'); });

  // ── INIT ─────────────────────────────────────────────────────────────
  load();
  ge('sessionDate').value = todayStr();
  showStart();

}()); // end IIFE
</script>
</body>
</html>
